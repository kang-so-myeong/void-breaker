<body>
<canvas id="gameCanvas"></canvas>

<!-- ═══ 상단 배너 광고 ═══ -->
<div id="ad-top" class="ad-container">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-2394673680543233"
       data-ad-slot="XXXXXXXXXX"
       data-ad-format="horizontal"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="ui-overlay">
  <div id="menu-screen" class="screen active">
    <h1 class="title glow">VOID<br>BREAKER</h1>
    <p class="subtitle">네온 우주를 지켜라</p>
    <div class="controls-info">
      <p>🎮 <b>WASD / 방향키</b> 이동</p>
      <p>🖱️ <b>마우스</b> 조준 &amp; 클릭 발사</p>

      <ins class="adsbygoogle"

    </div>
  </div>

  <div id="pause-screen" class="screen">
    <h2 class="glow">PAUSED</h2>
    <button class="neon-btn" onclick="game.resume()">RESUME</button>
  </div>

  <div id="gameover-screen" class="screen">
    <h2 class="glow red">GAME OVER</h2>
    <div id="final-stats"></div>
    <button class="neon-btn" onclick="game.restart()">RETRY</button>

    <!-- 게임오버 화면 광고 -->
    <div class="ad-gameover-container">
      <ins class="adsbygoogle"
           style="display:inline-block;width:336px;height:280px"

           data-ad-slot="XXXXXXXXXX"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <div id="hud">
    <div id="hud-left">
      <div class="hud-item"><span class="label">SCORE</span><span id="hud-score">0</span></div>
      <div class="hud-item"><span class="label">COMBO</span><span id="hud-combo">x1</span></div>
    </div>
    <div id="hud-center">
      <div id="wave-announce" class="hidden"></div>
    </div>
    <div id="hud-right">
      <div class="hud-item"><span class="label">WAVE</span><span id="hud-wave">1</span></div>
      <div class="hud-item hp-bar-wrap">
        <span class="label">HP</span>
        <div class="hp-bar"><div id="hp-fill"></div></div>
      </div>
      <div class="hud-item"><span class="label">DASH</span><div class="hp-bar"><div id="dash-fill"></div></div></div>
